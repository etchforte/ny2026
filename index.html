            flex: 0 0 auto;

            background: var(--ny-black);
            color: white;

            font-size: 0.9rem;

        .menu-btn.active {
            background: white;
            color: var(--ny-black);
            border-color: var(--ny-black);
        }
        .menu-btn.today-btn {
            background: #E3132C;
            color: white;
        }

            background: white;
            color: #E3132C;
            border-color: #E3132C;

        .task { font-size: 1.05rem; font-weight: 600; display: block; margin-top: 4px; color: #eee; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }

        .route-station::before { content: ''; display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 3px solid #666; z-index: 2; }

    // 중복 날짜 키 추출 및 일차 매핑 데이터 생성
    const uniqueDates = [...new Set(travelData.map(item => item.date))];
    let selectedDateKey = uniqueDates[0]; // 기본선택: 1일차

    function buildMenuBar() {
        const menuBar = document.getElementById('menuBar');
        menuBar.innerHTML = '';

        // Today 버튼 생성
        const todayBtn = document.createElement('button');
        todayBtn.className = 'menu-btn today-btn';
        todayBtn.innerText = 'Today';
        todayBtn.onclick = () => selectToday();
        menuBar.appendChild(todayBtn);

        // 각 날짜별 n일차 버튼 생성
        uniqueDates.forEach((dateStr, index) => {
            const btn = document.createElement('button');
            btn.className = 'menu-btn';
            btn.id = `btn-${dateStr.replace(/\.\s/g, '-')}`;
            btn.innerText = `${index + 1}일차`;
            btn.onclick = () => filterDate(dateStr);
            menuBar.appendChild(btn);
        });
    }

    function filterDate(dateStr) {
        selectedDateKey = dateStr;
        
        // 버튼 활성화 스타일 제어
        const buttons = document.querySelectorAll('.menu-btn');
        buttons.forEach(b => b.classList.remove('active'));
        
        const activeBtn = document.getElementById(`btn-${dateStr.replace(/\.\s/g, '-')}`);
        if(activeBtn) {
            activeBtn.classList.add('active');
            // 선택된 버튼이 가로 스크롤바 바깥에 있다면 자동으로 스크롤 이동
            activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        renderTimeline();
    }

    function selectToday() {
        // 시스템의 현재 날짜 구하기 (YYYY. MM. DD 포맷 매칭용)
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const todayStr = `${y}. ${m}. ${d}`;

        // travelData에 오늘 날짜가 있는지 검사
        const hasToday = uniqueDates.includes(todayStr);

        if(hasToday) {
            // 여행 중인 경우 해당 날짜로 피드백 및 스크롤
            const todayBtn = document.querySelector('.today-btn');
            todayBtn.classList.add('active');
            filterDate(todayStr);
        } else {
            // 여행 전이거나 끝난 경우 -> 알림 후 가장 첫 번째 날짜(1일차) 선택
            alert(`현재 날짜(${todayStr})는 여행 일정이 아닙니다. 1일차 일정으로 안내합니다.`);
            const todayBtn = document.querySelector('.today-btn');
            todayBtn.classList.remove('active');
            filterDate(uniqueDates[0]);
        }
    }

    function renderTimeline() {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';

        // 오직 선택된 날짜(selectedDateKey)의 데이터만 렌더링
        const itemsForDate = travelData.filter(item => item.date === selectedDateKey);
        
        if (itemsForDate.length > 0) {
            const sampleItem = itemsForDate[0];
            const dateLabel = sampleItem.date + ` (${sampleItem.day})`;

            const dateBox = document.createElement('div');
            dateBox.className = 'day-card';
            dateBox.innerHTML = `<span class="date-label">${dateLabel}</span>`;

            itemsForDate.forEach(item => {
                const div = document.createElement('div');
                if(item.task) {
                    div.className = 'schedule-item';
                    div.onclick = () => showRef(item.id);
                    const timeSpan = item.time ? `<span class="time">${item.time}</span>` : '';
                    div.innerHTML = `<div class="info-area">${timeSpan}<span class="task">${item.task}</span></div>`;
                } else {
                    div.className = 'empty-day';
                    div.innerHTML = `<span>미정</span>`;
                }
                dateBox.appendChild(div);
            });
            timeline.appendChild(dateBox);
        }
    }

    function closeModal() { document.getElementById('refModal').style.display = 'none'; }

    function showRef(id) {
        const item = travelData.find(d => d.id === id);
        document.getElementById('ref-title').innerText = item.task;
        
        const refTextField = document.getElementById('ref-text');
        if(item.isHtmlRef) {
            refTextField.style.whiteSpace = 'normal';
            refTextField.innerHTML = item.ref;
        } else {
            refTextField.style.whiteSpace = 'pre-wrap';
            refTextField.innerText = item.ref || "상세 정보가 없습니다.";
        }

        const btnArea = document.getElementById('action-button-area');
        btnArea.innerHTML = '';
        if(item.links) {
            item.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url; a.target = "_blank"; a.className = `action-link ${link.type}-link`;
                let icon = link.type === 'map' ? '📍 ' : link.type === 'img' ? '🖼️ ' : link.type === 'web' ? '🌐 ' : '📄 ';
                a.innerText = icon + link.name;
                btnArea.appendChild(a);
            });
        }
        document.getElementById('refModal').style.display = 'flex';
    }

    // 초기 실행
    buildMenuBar();
    filterDate(uniqueDates[0]); // 첫 실행 시 1일차 자동 로드
</script>
</body>
</html>
